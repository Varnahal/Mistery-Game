<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Game</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #8b5cf6;
            --accent-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Opcional: evita scroll se os mouses saírem da área */
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--accent-color);
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        .btn-stack {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-join {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-join:hover { background-color: var(--accent-hover); }

        .btn-start {
            background-color: #10b981;
            color: white;
        }

        .btn-start:hover { background-color: #059669; }

        table {
            width: 100%;
            margin-top: 2rem;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            padding-bottom: 8px;
            border-bottom: 1px solid #334155;
        }

        td {
            padding: 12px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 0.95rem;
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: #334155;
            margin-left: 8px;
        }

        /* Modal Simples para o Role */
        #role-display {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--accent-color);
        }

        #countdown-overlay {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9); /* Cor do fundo do app */
            z-index: 999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #countdown-number {
            font-size: 8rem;
            font-weight: 800;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        #linkDesenho {
            display: none;
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .remote-cursor {
            position: fixed;
            top: 0;   /* Importante: comece no zero para o translate funcionar */
            left: 0;  /* Importante: comece no zero para o translate funcionar */
            pointer-events: none;
            z-index: 9999;
            will-change: transform; /* Melhora a performance da animação */
        }

        .cursor-pointer {
            width: 15px;
            height: 15px;
            background-color: var(--accent-color);
            border-radius: 50%;
            border: 2px solid white;
        }

        .cursor-label {
            position: absolute;
            top: 18px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    
<div id="countdown-overlay">
    <div id="countdown-number"></div>
</div>

<div class="container">
    <h1>🕵️ MYSTERY GAME</h1>
    
    <div class="input-group">
        <input type="text" id="name" placeholder="Digite seu nome...">
        <div id="leader-area" style="display: none; margin-bottom: 15px;">
            <p style="font-size: 0.8rem; color: var(--accent-color);">Você é o Líder! Escolha o grupo de temas:</p>
            <select id="theme-selector" style="width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid var(--accent-color);">
                <option value="aleatorio">🎲 Totalmente Aleatório</option>
            </select>
        </div>
        <div class="btn-stack">
            <button class="btn-join" onclick="join()">Entrar</button>
            <button class="btn-start" onclick="start()">Começar</button>
        </div>
    </div>

    <div id="role-display"></div>

    <table>
        <thead>
            <tr>
                <th>Jogadores Online</th>
            </tr>
        </thead>
        <tbody id="players">
            </tbody>
    </table>
    <p id="linkDesenho">Link para o desenho: <a href="https://magma.com/d/rsQiSnAT3X" target="_blank">https://magma.com/d/rsQiSnAT3X</a></p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io({ transports: ["websocket"] });

    function join() {
        const nameInput = document.getElementById("name");
        if(nameInput.value.trim() === "") return alert("Digite um nome!");
        socket.emit("join", nameInput.value);
        nameInput.disabled = true; // Evita trocar nome no meio
    }

    socket.on("lista_categorias", (nomesCategorias) => {
        const selector = document.getElementById("theme-selector");
        
        // Mantém apenas a primeira opção (Aleatório) e remove o resto para não duplicar
        selector.innerHTML = '<option value="aleatorio">🎲 Totalmente Aleatório</option>';

        nomesCategorias.forEach(cat => {
            const opt = document.createElement("option");
            opt.value = cat;
            opt.textContent = cat; // O nome que aparecerá no select
            selector.appendChild(opt);
        });
    });

    // Atualiza a função start para enviar o tema escolhido
    function start() {
        const temaEscolhido = document.getElementById("theme-selector").value;
        socket.emit("start", temaEscolhido);
    }

    socket.on("role", (data) => {
        const display = document.getElementById("role-display");
        display.style.display = "block";
        
        // Estética para a categoria (aparece para todos)
        const categoriaHTML = `<div style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 5px;">CATEGORIA: ${data.categoria}</div>`;

        if (data.impostor) {
            display.innerHTML = `
                ${categoriaHTML}
                <b style="color: var(--danger); font-size: 1.2rem;">VOCÊ É O IMPOSTOR!</b><br>
                <span style="font-size: 0.9rem;">Tente descobrir o local sem ser pego.</span>
            `;
        } else {
            display.innerHTML = `
                ${categoriaHTML}
                Local: <b style="color: #10b981; font-size: 1.2rem;">${data.tema}</b><br>
                <span style="font-size: 0.9rem;">Faça perguntas para achar o impostor!</span>
            `;
        }
    });

    socket.on("players", (data) => {
        const tbody = document.getElementById("players");
        tbody.innerHTML = "";
        
        // Verifica se EU sou o líder (o primeiro da lista)
        const isLeader = data.length > 0 && data[0].id === socket.id;
        document.getElementById("leader-area").style.display = isLeader ? "block" : "none";
        document.querySelector(".btn-start").style.display = isLeader ? "block" : "none";

        data.forEach((player, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${player.name} ${index === 0 ? '<span class="status-badge" style="color: gold;">👑 Líder</span>' : ''}</td>
            `;
            tbody.appendChild(tr);
        });
    });

    socket.on("preparing_start", () => {
        const overlay = document.getElementById("countdown-overlay");
        const number = document.getElementById("countdown-number");
        let count = 3;

        overlay.style.display = "flex";
        number.textContent = count;

        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                number.textContent = count;
            } else if (count === 0) {
                number.textContent = "VAI!";
            } else {
                clearInterval(interval);
                overlay.style.display = "none";
            }
        }, 1000);
    });


    const cursors = {};

    let lastSend = 0;
    window.addEventListener('mousemove', (e) => {
        const now = Date.now();
        if (now - lastSend > 50) {
            const name = document.getElementById("name").value;
            if (name) {
                // Calcula a posição em porcentagem (0 a 1)
                const xPct = e.clientX / window.innerWidth;
                const yPct = e.clientY / window.innerHeight;

                socket.emit("mouse_move", {
                    x: xPct,
                    y: yPct,
                    name: name
                });
            }
            lastSend = now;
        }
    });

    // 2. Atualizar cursores dos outros
    socket.on("mouse_update", (data) => {
        let cursorDiv = cursors[data.id];

        if (!cursorDiv) {
            cursorDiv = document.createElement("div");
            cursorDiv.className = "remote-cursor";
            cursorDiv.innerHTML = `
                <div class="cursor-pointer"></div>
                <div class="cursor-label">${data.name}</div>
            `;
            document.body.appendChild(cursorDiv);
            cursors[data.id] = cursorDiv;
        }

        // Converte a porcentagem de volta para pixels baseada na tela ATUAL
        const xPx = data.x * window.innerWidth;
        const yPx = data.y * window.innerHeight;

        cursorDiv.style.transform = `translate(${xPx}px, ${yPx}px)`;
    });

    // 3. Remover cursor quando alguém sai
    socket.on("remove_cursor", (id) => {
        if (cursors[id]) {
            cursors[id].remove();
            delete cursors[id];
        }
    });
</script>

</body>
</html>
